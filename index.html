<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Produtos Podológicos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #222;
    padding-bottom: 100px;
  }
  header {
    background: #128C7E;
    color: white;
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  header h1 { font-size: 22px; }
  header p { font-size: 13px; opacity: .9; margin-top: 4px; }
  .container { max-width: 900px; margin: 0 auto; padding: 16px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,.08);
    display: flex;
    flex-direction: column;
  }
  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: #eee;
  }
  .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
  .card h3 { font-size: 16px; margin-bottom: 6px; }
  .card .desc { font-size: 13px; color: #666; margin-bottom: 10px; flex: 1; }
  .card .preco { font-size: 18px; font-weight: bold; color: #128C7E; margin-bottom: 10px; }
  .qty-control {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f0f0f0;
    border-radius: 8px;
    padding: 4px;
  }
  .qty-control button {
    width: 36px;
    height: 36px;
    border: none;
    background: #128C7E;
    color: white;
    font-size: 18px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
  }
  .qty-control button:disabled { background: #ccc; cursor: not-allowed; }
  .qty-control span { font-size: 16px; font-weight: bold; }
  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    box-shadow: 0 -2px 10px rgba(0,0,0,.1);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .total { font-size: 16px; }
  .total strong { font-size: 20px; color: #128C7E; }
  .btn-finalizar {
    background: #25D366;
    color: white;
    border: none;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    flex-shrink: 0;
  }
  .btn-finalizar:disabled { background: #ccc; cursor: not-allowed; }
  .loading, .erro { text-align: center; padding: 40px; color: #666; }
  .erro { color: #c00; }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .card img { height: 120px; }
    .card h3 { font-size: 14px; }
    .card .desc { font-size: 12px; }
    .card .preco { font-size: 15px; }
    .btn-finalizar { padding: 12px 16px; font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <h1>🛒 MJ Produtos Podológicos</h1>
  <p>Selecione os produtos e finalize pelo WhatsApp</p>
</header>

<div class="container">
  <div id="produtos" class="grid">
    <div class="loading">Carregando produtos...</div>
  </div>
</div>

<div class="footer-bar">
  <div class="total">Total: <strong id="total">R$ 0,00</strong></div>
  <button id="btnFinalizar" class="btn-finalizar" disabled onclick="finalizarPedido()">
    Finalizar no WhatsApp
  </button>
</div>

<script>
  // ====== CONFIGURAÇÃO ======
  const WHATSAPP_NUMERO = "5561998417189"; // seu número
  // ==========================

  let produtos = [];
  const carrinho = {}; // { id: quantidade }

  async function carregarProdutos() {
    try {
      const resp = await fetch('produtos.json?v=' + Date.now());
      if (!resp.ok) throw new Error('Falha ao carregar');
      produtos = await resp.json();
      renderizar();
    } catch (e) {
      document.getElementById('produtos').innerHTML =
        '<div class="erro">Erro ao carregar produtos. Verifique o arquivo produtos.json</div>';
      console.error(e);
    }
  }

  function renderizar() {
    const container = document.getElementById('produtos');
    container.innerHTML = produtos.map(p => `
      <div class="card">
        <img src="${p.imagem}" alt="${p.nome}" onerror="this.src='https://via.placeholder.com/300x180?text=Sem+Imagem'">
        <div class="card-body">
          <h3>${p.nome}</h3>
          <p class="desc">${p.descricao}</p>
          <div class="preco">R$ ${p.preco.toFixed(2).replace('.', ',')}</div>
          <div class="qty-control">
            <button onclick="alterarQtd(${p.id}, -1)" ${!carrinho[p.id] ? 'disabled' : ''}>−</button>
            <span id="qtd-${p.id}">${carrinho[p.id] || 0}</span>
            <button onclick="alterarQtd(${p.id}, 1)">+</button>
          </div>
        </div>
      </div>
    `).join('');
    atualizarTotal();
  }

  function alterarQtd(id, delta) {
    const atual = carrinho[id] || 0;
    const nova = atual + delta;
    if (nova <= 0) delete carrinho[id];
    else carrinho[id] = nova;
    renderizar();
  }

  function atualizarTotal() {
    let total = 0;
    let temItem = false;
    for (const id in carrinho) {
      const p = produtos.find(x => x.id == id);
      if (p) {
        total += p.preco * carrinho[id];
        temItem = true;
      }
    }
    document.getElementById('total').textContent =
      'R$ ' + total.toFixed(2).replace('.', ',');
    document.getElementById('btnFinalizar').disabled = !temItem;
  }

  function finalizarPedido() {
    let msg = '*Novo Pedido*%0A%0A';
    let total = 0;
    for (const id in carrinho) {
      const p = produtos.find(x => x.id == id);
      if (p) {
        const sub = p.preco * carrinho[id];
        total += sub;
        msg += `• ${carrinho[id]}x ${p.nome} - R$ ${sub.toFixed(2).replace('.', ',')}%0A`;
      }
    }
    msg += `%0A*Total: R$ ${total.toFixed(2).replace('.', ',')}*`;
    window.open(`https://wa.me/${WHATSAPP_NUMERO}?text=${msg}`, '_blank');
  }

  carregarProdutos();
</script>

</body>
</html>
